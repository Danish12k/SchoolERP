<div class="col-sm-12">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Assign Section</mat-card-title>
        </mat-card-header>
        <form [formGroup]="assignSectionForm" (ngSubmit)="submitForm()">
            <mat-card-content>
                <div class="assign-section-form">
                    <div class="assign-section-form__grid">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Select Session</mat-label>
                            <mat-select formControlName="sessionId" (selectionChange)="getSchoolListById()">
                                @for (session of sessions; track session.sessionId) {
                                <mat-option [value]="session.sessionId">
                                    {{ session.sessionName }}
                                </mat-option>
                                }
                            </mat-select>
                        </mat-form-field>

                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Select School</mat-label>
                            <mat-select formControlName="collegeId" (selectionChange)="getSchoolListById()">
                                @for (school of schools; track school.collegeId) {
                                <mat-option [value]="school.collegeId">
                                    {{ school.collegeAbreviation }}
                                </mat-option>
                                }
                            </mat-select>
                        </mat-form-field>

                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Select Class</mat-label>
                            <mat-select formControlName="courseId">
                                @for (class of classs; track class.courseId) {
                                <mat-option [value]="class.courseId">
                                    {{ class.courseName }}
                                </mat-option>
                                }
                            </mat-select>
                        </mat-form-field>

                        <app-section-filter
                            [form]="assignSectionForm"
                            [inline]="true"
                            [showActive]="false"
                            sectionKey="sectionId"
                            sectionLabel="Select Sections"
                        />
                    </div>

                    <div class="assign-section-form__actions">
                        <button mat-flat-button color="primary" type="submit">Save</button>
                        <button mat-button type="button" (click)="onCancel()">Cancel</button>
                    </div>
                </div>
            </mat-card-content>
        </form>
    </mat-card>
</div>
