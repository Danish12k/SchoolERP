<div class="col-sm-12">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Add County</mat-card-title>
        </mat-card-header>
        <form [formGroup]="countryGroupForm" (ngSubmit)="addCountry()">
            <mat-card-content>
                <div class="form-field-full">
                    <div class="row">
                        <div class="col-sm-3">
                            <mat-form-field class="w-100">
                                <mat-label>County</mat-label>
                                <input matInput formControlName="countryName" placeholder="Please Enter County Name" />
                                @if (countryGroupForm.get('countryName')?.hasError('required') &&
                                countryGroupForm.get('countryName')?.touched) {
                                <mat-error>County is required</mat-error>
                                }
                            </mat-form-field>
                        </div>
                    </div>
                    <div class="m-t-8">
                        <button mat-flat-button color="primary" type="submit">Save</button>
                    </div>
                </div>
            </mat-card-content>
        </form>
    </mat-card>
</div>


<div class="col-sm-12">
    <mat-card>
        <mat-card-content>
            <mat-form-field appearance="outline">
                <mat-label>Search</mat-label>
                <input matInput (keyup)="applyFilter($event)" placeholder="Filter Country">
            </mat-form-field>
            <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
                <ng-container matColumnDef="Country">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Country</th>
                    <td mat-cell *matCellDef="let element">{{ element.countryName }}</td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef>Actions</th>
                    <td mat-cell *matCellDef="let row">
                        <!-- <button mat-icon-button color="primary" (click)="openEditDialog(row)"> -->
                              <button mat-icon-button color="primary">
                            <mat-icon>drive_file_rename_outline</mat-icon>
                        </button>
                    </td>
                </ng-container>
                <!-- Header & Rows -->
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
            <!-- Paginator -->
            <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>

        </mat-card-content>
    </mat-card>
</div>
